# ============================================================
#  Spring Application
# ============================================================
spring.application.name=jobapp

# ============================================================
#  Database - MySQL
#  Trong Docker: SPRING_DATASOURCE_URL được inject qua env
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/job_db?serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================================
#  JWT
# ============================================================
jwt.secret=${JWT_SECRET:Hy7kP2mN9qR4sT6uW8xZ0aB3cD5eF7gH9iJ1kL3mN5oP7qR9sT1uV3wX5yZ7aB=}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# ============================================================
#  MinIO  (app.minio.* — dùng bởi MinioConfig & MinioService)
# ============================================================
app.minio.url=${MINIO_URL:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
app.minio.bucket=${MINIO_BUCKET:job-uploads}
app.minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000/job-uploads}

# ============================================================
#  File Upload - local fallback (không dùng khi đã có MinIO)
# ============================================================
upload.base-dir=/var/www/uploads
upload.jobs-dir=/var/www/uploads/jobs
upload.products-dir=/var/www/uploads/products
upload.base-url=${UPLOAD_BASE_URL:http://localhost:8080/uploads}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# ============================================================
#  Mail — gửi OTP
# ============================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OTP hết hạn sau 5 phút
otp.expiration-ms=300000

# ============================================================
#  Server
# ============================================================
server.port=8080

# ============================================================
#  Logging
# ============================================================
logging.level.com.example.jobapp=INFO
logging.level.org.springframework.security=WARN
